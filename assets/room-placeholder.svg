<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3200 2000" width="3200" height="2000">
  <!--
    KAYLUV.SITE — ROOM COMPOSITION TEMPLATE (build step 2, SPEC §9)
    3200×2000 px, 16:10 (SPEC §3). This is NOT final art: the collage room
    will be composed over this template. Rectangle positions here MUST match
    js/hotspot-data.js — if you move a box, retune the data file (or vice versa).
  -->

  <!-- ground: paper-white, faint Kayluv-blue wall wash above the floor line -->
  <rect x="0" y="0" width="3200" height="2000" fill="#F7F2E8"/>
  <rect x="0" y="0" width="3200" height="1330" fill="rgba(48,120,192,0.04)"/>
  <line x1="0" y1="1330" x2="3200" y2="1330" stroke="#C9BFA8" stroke-width="3" stroke-dasharray="4 14"/>
  <text x="3180" y="1316" text-anchor="end" font-family="Avenir Next, Futura, Helvetica, sans-serif" font-size="26" fill="#9A8F76">floor line (suggestion)</text>

  <!-- center crosshairs -->
  <line x1="1600" y1="150" x2="1600" y2="1850" stroke="#D8CDB8" stroke-width="2" stroke-dasharray="2 16"/>
  <line x1="160" y1="1000" x2="3040" y2="1000" stroke="#D8CDB8" stroke-width="2" stroke-dasharray="2 16"/>

  <!-- HOTSPOT SAFE ZONE — central 90% width × 85% height (SPEC §3) -->
  <rect x="160" y="150" width="2880" height="1700" fill="none" stroke="#F0A800" stroke-width="5" stroke-dasharray="24 18"/>
  <text x="185" y="205" font-family="Avenir Next, Futura, Helvetica, sans-serif" font-size="32" font-weight="600" fill="#B27C00">HOTSPOT SAFE ZONE — central 90% W × 85% H · all interactive objects stay inside · canvas edges are atmosphere only</text>

  <!-- header -->
  <g font-family="Avenir Next, Futura, Helvetica, sans-serif" fill="#5A5142">
    <text x="185" y="78" font-size="44" font-weight="700">KAYLUV.SITE — ROOM COMPOSITION TEMPLATE · 3200×2000 (16:10)</text>
    <text x="185" y="126" font-size="28">Placeholder for the collage room. Solid blue boxes = interactive hotspots. Dashed gray boxes = static furniture at launch. Dotted = non-interactive scenery hints.</text>
  </g>
  <text x="1600" y="1952" text-anchor="middle" font-family="Avenir Next, Futura, Helvetica, sans-serif" font-size="30" fill="#9A8F76">EDGE MARGIN — ATMOSPHERE ONLY (floorboards, wallpaper, shelf ends, ceiling)</text>

  <!-- non-interactive scenery hints -->
  <g font-family="Avenir Next, Futura, Helvetica, sans-serif">
    <rect x="2450" y="60" width="670" height="130" fill="none" stroke="#B4AA92" stroke-width="3" stroke-dasharray="4 12" rx="10"/>
    <text x="2785" y="140" text-anchor="middle" font-size="30" fill="#9A8F76">SHOP SIGNAGE — wordmark (non-interactive)</text>
    <rect x="1980" y="1400" width="660" height="300" fill="none" stroke="#B4AA92" stroke-width="3" stroke-dasharray="4 12" rx="10"/>
    <text x="2310" y="1660" text-anchor="middle" font-size="28" fill="#9A8F76">counter (furniture, non-interactive)</text>
  </g>

  <!-- ============ INTERACTIVE OBJECTS (SPEC §6) ============ -->
  <g font-family="Avenir Next, Futura, Helvetica, sans-serif">

    <!-- Bulletin board → /bulletin/ -->
    <g>
      <rect x="260" y="420" width="560" height="560" rx="18" fill="rgba(48,120,192,0.10)" stroke="#3078C0" stroke-width="5"/>
      <text x="540" y="640" text-anchor="middle" font-size="44" font-weight="700" fill="#1E4E80">BULLETIN BOARD</text>
      <text x="540" y="700" text-anchor="middle" font-size="34" fill="#1E4E80">&#8594; /bulletin/</text>
      <text x="540" y="754" text-anchor="middle" font-size="26" fill="#48688C">papers flutter · keep central slot</text>
      <text x="540" y="792" text-anchor="middle" font-size="26" fill="#48688C">clear for the Dumke notice</text>
    </g>

    <!-- Letter slot / pigeonholes → /correspondence/ -->
    <g>
      <rect x="900" y="380" width="380" height="500" rx="18" fill="rgba(48,120,192,0.10)" stroke="#3078C0" stroke-width="5"/>
      <text x="1090" y="560" text-anchor="middle" font-size="34" font-weight="700" fill="#1E4E80">LETTER SLOT /</text>
      <text x="1090" y="604" text-anchor="middle" font-size="34" font-weight="700" fill="#1E4E80">PIGEONHOLES</text>
      <text x="1090" y="656" text-anchor="middle" font-size="28" fill="#1E4E80">&#8594; /correspondence/</text>
      <text x="1090" y="700" text-anchor="middle" font-size="24" fill="#48688C">heart seal motif</text>
    </g>

    <!-- Cuckoo clock — no destination -->
    <g>
      <rect x="1370" y="230" width="230" height="390" rx="18" fill="rgba(48,120,192,0.10)" stroke="#3078C0" stroke-width="5"/>
      <text x="1485" y="380" text-anchor="middle" font-size="30" font-weight="700" fill="#1E4E80">CUCKOO</text>
      <text x="1485" y="420" text-anchor="middle" font-size="30" font-weight="700" fill="#1E4E80">CLOCK</text>
      <text x="1485" y="466" text-anchor="middle" font-size="22" fill="#48688C">no destination</text>
      <text x="1485" y="498" text-anchor="middle" font-size="22" fill="#48688C">tracks real time</text>
    </g>

    <!-- Portrait → /proprietor/ -->
    <g>
      <rect x="1700" y="320" width="360" height="480" rx="18" fill="rgba(48,120,192,0.10)" stroke="#3078C0" stroke-width="5"/>
      <text x="1880" y="520" text-anchor="middle" font-size="40" font-weight="700" fill="#1E4E80">PORTRAIT</text>
      <text x="1880" y="572" text-anchor="middle" font-size="32" fill="#1E4E80">&#8594; /proprietor/</text>
      <text x="1880" y="616" text-anchor="middle" font-size="24" fill="#48688C">blinks occasionally</text>
    </g>

    <!-- Door (ajar) → /backroom/ (post-launch destination) -->
    <g>
      <rect x="2620" y="300" width="400" height="1260" rx="18" fill="rgba(48,120,192,0.10)" stroke="#3078C0" stroke-width="5"/>
      <text x="2820" y="820" text-anchor="middle" font-size="40" font-weight="700" fill="#1E4E80">DOOR (AJAR)</text>
      <text x="2820" y="872" text-anchor="middle" font-size="32" fill="#1E4E80">&#8594; /backroom/</text>
      <text x="2820" y="920" text-anchor="middle" font-size="24" fill="#48688C">unlabeled · warm light leak below</text>
      <text x="2820" y="954" text-anchor="middle" font-size="24" fill="#48688C">launch: &#8220;Closed for inventory&#8221; note</text>
      <text x="2820" y="988" text-anchor="middle" font-size="24" fill="#48688C">Back Room dest is post-launch</text>
    </g>

    <!-- Ledger + lectern → /catalogue/ (HERO) -->
    <g>
      <rect x="1330" y="900" width="470" height="660" rx="18" fill="rgba(48,120,192,0.14)" stroke="#3078C0" stroke-width="8"/>
      <text x="1565" y="1170" text-anchor="middle" font-size="44" font-weight="700" fill="#1E4E80">LEDGER + LECTERN</text>
      <text x="1565" y="1228" text-anchor="middle" font-size="34" fill="#1E4E80">&#8594; /catalogue/</text>
      <text x="1565" y="1280" text-anchor="middle" font-size="26" fill="#48688C">HERO · the only floating object</text>
      <text x="1565" y="1318" text-anchor="middle" font-size="26" fill="#48688C">brightest lighting in the room</text>
    </g>

    <!-- Till / cash register → /counter/ -->
    <g>
      <rect x="2050" y="1000" width="470" height="420" rx="18" fill="rgba(48,120,192,0.10)" stroke="#3078C0" stroke-width="5"/>
      <text x="2285" y="1170" text-anchor="middle" font-size="40" font-weight="700" fill="#1E4E80">TILL / REGISTER</text>
      <text x="2285" y="1222" text-anchor="middle" font-size="34" fill="#1E4E80">&#8594; /counter/</text>
      <text x="2285" y="1270" text-anchor="middle" font-size="26" fill="#48688C">on the counter · separate</text>
      <text x="2285" y="1306" text-anchor="middle" font-size="26" fill="#48688C">object from the Ledger (SPEC §2)</text>
    </g>

    <!-- Cat — no destination -->
    <g>
      <rect x="340" y="1350" width="360" height="300" rx="18" fill="rgba(48,120,192,0.10)" stroke="#3078C0" stroke-width="5"/>
      <text x="520" y="1470" text-anchor="middle" font-size="40" font-weight="700" fill="#1E4E80">CAT</text>
      <text x="520" y="1520" text-anchor="middle" font-size="26" fill="#48688C">no destination · sleeps, reacts</text>
      <text x="520" y="1556" text-anchor="middle" font-size="26" fill="#48688C">may relocate between visits</text>
    </g>

    <!-- Radio — static furniture at launch -->
    <g>
      <rect x="2140" y="560" width="340" height="320" rx="18" fill="rgba(100,110,120,0.08)" stroke="#8A939C" stroke-width="5" stroke-dasharray="18 14"/>
      <text x="2310" y="690" text-anchor="middle" font-size="36" font-weight="700" fill="#5C666F">RADIO</text>
      <text x="2310" y="736" text-anchor="middle" font-size="24" fill="#6A7178">static at launch</text>
      <text x="2310" y="770" text-anchor="middle" font-size="22" fill="#6A7178">post-launch: /radio/</text>
    </g>

    <!-- Magic lantern — static furniture at launch -->
    <g>
      <rect x="900" y="1150" width="300" height="350" rx="18" fill="rgba(100,110,120,0.08)" stroke="#8A939C" stroke-width="5" stroke-dasharray="18 14"/>
      <text x="1050" y="1300" text-anchor="middle" font-size="27" font-weight="700" fill="#5C666F">MAGIC LANTERN</text>
      <text x="1050" y="1342" text-anchor="middle" font-size="22" fill="#6A7178">static at launch</text>
      <text x="1050" y="1374" text-anchor="middle" font-size="22" fill="#6A7178">post-launch: /lantern/</text>
    </g>

  </g>
</svg>
